<!DOCTYPE html>

<body>
  <h1>TqkLibrary.StreamRelay</h1>
  <p>Relay is running. The browser fMP4/MSE viewer is added in milestone M6.</p>
  <p>Native clients connect over WebSocket:</p>
  <ul>
    <li>Ingest: <code>ws://&lt;host&gt;/relay/ingest/&lt;guid&gt;?format=mpegts</code></li>
    <li>View: <code>ws://&lt;host&gt;/relay/view/&lt;guid&gt;</code></li>
  </ul>
</body>
